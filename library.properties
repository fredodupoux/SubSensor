name=SubmersibleSensor
version=1.0.0
author=Frederic Dupoux
maintainer=Frederic Dupoux
sentence=Arduino library for 4-20mA submersible hydrostatic pressure sensors (TL-136-like) using an ADS1115 16-bit I2C ADC, with EMA smoothing and EEPROM config persistence.
paragraph=Reads a 4-20mA hydrostatic pressure sensor (e.g., TL-136-like) via an ADS1115 external ADC (I2C), converts current to level/volume for cylindrical tanks, supports EMA smoothing, configurable ADS1115 channel and PGA gain, and saves/restores calibration values to EEPROM. Sensor supply typically 12-32VDC. Works on ESP8266, ESP32, and AVR.
category=Sensors
url=https://github.com/fredodupoux/SubSensor
architectures=esp8266,esp32,avr
includes=SubSensor.h
depends=Adafruit ADS1X15
