name=TankSensor
version=1.0.0
author=Frederic Dupoux
maintainer=Frederic Dupoux
sentence=Arduino library for 4-20mA submersible level sensors using an ADS1115 16-bit I2C ADC, with EMA smoothing and EEPROM config persistence.
paragraph=Reads a 4-20mA sensor via an ADS1115 external ADC (I2C), converts current to level/volume for cylindrical tanks, supports EMA smoothing, configurable ADS1115 channel and PGA gain, and saves/restores all calibration values to EEPROM. Works on ESP8266, ESP32, and AVR.
category=Sensors
